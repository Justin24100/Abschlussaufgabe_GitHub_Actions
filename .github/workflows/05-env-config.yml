name: 05 Env Config

on:
  workflow_dispatch:

env:
  CUSTOMER_NAME: Nordstern GmbH
  DEPLOY_ENV: staging

jobs:
  env-config:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Konfigurationsuebersicht erstellen
        env:
          RELEASE_VERSION: 1.0.0
        run: bash scripts/06_env_config.sh

      - name: Konfigurationsuebersicht hochladen
        uses: actions/upload-artifact@v4
        with:
          name: nordstern-config-summary
          path: output/config-summary.txt
