name: 03 Report Artifact

on:
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "scripts/**"
      - ".github/workflows/03-report-artifact.yml"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Report erstellen
        run: bash scripts/04_create_report.sh

      - name: Report als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: nordstern-report
          path: output/report.md
