name: 06 Secrets Variables

on:
  workflow_dispatch:

jobs:
  secret-check:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Konfigurationsuebersicht aus Repository Variables erstellen
        env:
          CUSTOMER_NAME: ${{ vars.NORDSTERN_APP_NAME }}
          DEPLOY_ENV: ${{ vars.NORDSTERN_STAGE }}
          RELEASE_VERSION: ${{ vars.NORDSTERN_RELEASE_VERSION }}
        run: bash scripts/06_env_config.sh

      - name: Secret pruefen
        env:
          NORDSTERN_API_TOKEN: ${{ secrets.NORDSTERN_API_TOKEN }}
        run: bash scripts/07_secret_check.sh

      - name: Ergebnisse hochladen
        uses: actions/upload-artifact@v4
        with:
          name: nordstern-secret-results
          path: |
            output/config-summary.txt
            output/secret-check.txt
